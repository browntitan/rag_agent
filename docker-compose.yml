name: agentic-rag

services:
  rag-postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${RAG_DB_NAME:-ragdb}
      POSTGRES_USER: ${RAG_DB_USER:-raguser}
      POSTGRES_PASSWORD: ${RAG_DB_PASSWORD:-ragpass}
    ports:
      - "${RAG_DB_PORT:-5432}:5432"
    volumes:
      - rag_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RAG_DB_USER:-raguser} -d ${RAG_DB_NAME:-ragdb}"]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./data/ollama/gguf:/gguf

  ollama-gguf-importer:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    restart: "no"
    depends_on:
      ollama:
        condition: service_started
    env_file:
      - path: .env
        required: false
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_GGUF_AUTO_IMPORT: ${OLLAMA_GGUF_AUTO_IMPORT:-false}
      OLLAMA_GGUF_MODEL_NAME: ${OLLAMA_GGUF_MODEL_NAME:-}
      OLLAMA_GGUF_MODELFILE: ${OLLAMA_GGUF_MODELFILE:-/gguf/Modelfile}
    volumes:
      - ./data/ollama/gguf:/gguf:ro
    entrypoint: >
      /bin/sh -c "
      set -eu;
      if [ \"${OLLAMA_GGUF_AUTO_IMPORT}\" != \"true\" ]; then
        echo 'OLLAMA_GGUF_AUTO_IMPORT=false -> skipping GGUF import';
        exit 0;
      fi;
      if [ -z \"${OLLAMA_GGUF_MODEL_NAME}\" ]; then
        echo 'OLLAMA_GGUF_MODEL_NAME is required when auto import is enabled';
        exit 1;
      fi;
      if [ ! -f \"${OLLAMA_GGUF_MODELFILE}\" ]; then
        echo \"Modelfile not found at ${OLLAMA_GGUF_MODELFILE}\";
        exit 1;
      fi;
      i=0;
      until ollama list >/dev/null 2>&1; do
        i=$((i + 1));
        if [ $i -ge 60 ]; then
          echo 'Timed out waiting for Ollama API';
          exit 1;
        fi;
        sleep 2;
      done;
      if ollama list | awk 'NR>1 {print $1}' | grep -Fx \"${OLLAMA_GGUF_MODEL_NAME}\" >/dev/null 2>&1; then
        echo \"Model ${OLLAMA_GGUF_MODEL_NAME} already exists; skipping create\";
        exit 0;
      fi;
      echo \"Creating model ${OLLAMA_GGUF_MODEL_NAME} from ${OLLAMA_GGUF_MODELFILE}\";
      ollama create \"${OLLAMA_GGUF_MODEL_NAME}\" -f \"${OLLAMA_GGUF_MODELFILE}\";
      echo 'GGUF import complete';
      "

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      rag-postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      PG_DSN: postgresql://${RAG_DB_USER:-raguser}:${RAG_DB_PASSWORD:-ragpass}@rag-postgres:5432/${RAG_DB_NAME:-ragdb}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL_DOCKER:-http://ollama:11434}
      LANGFUSE_HOST: ${LANGFUSE_HOST_DOCKER:-http://langfuse-web:3000}
      WAIT_FOR_DB: ${WAIT_FOR_DB:-true}
      APP_AUTO_MIGRATE: ${APP_AUTO_MIGRATE:-true}
      APP_AUTO_INIT_KB: ${APP_AUTO_INIT_KB:-false}
      DB_WAIT_TIMEOUT_SECONDS: ${DB_WAIT_TIMEOUT_SECONDS:-90}
    volumes:
      - ./:/app
    ports:
      - "${APP_API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health/live >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    tty: true
    stdin_open: true
    command: ["python", "run.py", "serve-api", "--host", "0.0.0.0", "--port", "8000"]

  langfuse-postgres:
    image: postgres:17
    profiles: ["observability"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${LANGFUSE_POSTGRES_PASSWORD:-postgres}
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 12

  langfuse-redis:
    image: redis:7
    profiles: ["observability"]
    restart: unless-stopped
    command: >
      --requirepass ${LANGFUSE_REDIS_AUTH:-myredissecret}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${LANGFUSE_REDIS_AUTH:-myredissecret} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 12

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server
    profiles: ["observability"]
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhouse}
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - langfuse_clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  langfuse-minio:
    image: minio/minio
    profiles: ["observability"]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${LANGFUSE_MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${LANGFUSE_MINIO_ROOT_PASSWORD:-miniosecret}
    ports:
      - "${LANGFUSE_MINIO_API_PORT:-9090}:9000"
      - "${LANGFUSE_MINIO_CONSOLE_PORT:-9091}:9001"
    volumes:
      - langfuse_minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  langfuse-minio-create-bucket:
    image: minio/mc
    profiles: ["observability"]
    depends_on:
      langfuse-minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://langfuse-minio:9000 ${LANGFUSE_MINIO_ROOT_USER:-minio} ${LANGFUSE_MINIO_ROOT_PASSWORD:-miniosecret};
      mc mb -p local/langfuse || true;
      mc anonymous set none local/langfuse || true;
      exit 0;
      "

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    profiles: ["observability"]
    restart: unless-stopped
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
      langfuse-minio-create-bucket:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:${LANGFUSE_POSTGRES_PASSWORD:-postgres}@langfuse-postgres:5432/postgres
      SALT: ${LANGFUSE_SALT:-mysalt}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:-00000000000000000000000000000000}
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      REDIS_AUTH: ${LANGFUSE_REDIS_AUTH:-myredissecret}
      REDIS_TLS_ENABLED: "false"
      AWS_ACCESS_KEY_ID: ${LANGFUSE_MINIO_ROOT_USER:-minio}
      AWS_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_ROOT_PASSWORD:-miniosecret}
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: langfuse
      AWS_S3_ENDPOINT: http://langfuse-minio:9000
      AWS_S3_FORCE_PATH_STYLE: "true"
      AWS_S3_UPLOAD_BUCKET_URL: http://langfuse-minio:9000/langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_ROOT_PASSWORD:-miniosecret}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://langfuse-minio:9000/langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_ROOT_PASSWORD:-miniosecret}
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      TELEMETRY_ENABLED: "false"
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-mysecret}

  langfuse-web:
    image: langfuse/langfuse:3
    profiles: ["observability"]
    restart: unless-stopped
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
      langfuse-minio-create-bucket:
        condition: service_completed_successfully
    ports:
      - "${LANGFUSE_WEB_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://postgres:${LANGFUSE_POSTGRES_PASSWORD:-postgres}@langfuse-postgres:5432/postgres
      SALT: ${LANGFUSE_SALT:-mysalt}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:-00000000000000000000000000000000}
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      REDIS_AUTH: ${LANGFUSE_REDIS_AUTH:-myredissecret}
      REDIS_TLS_ENABLED: "false"
      AWS_ACCESS_KEY_ID: ${LANGFUSE_MINIO_ROOT_USER:-minio}
      AWS_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_ROOT_PASSWORD:-miniosecret}
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: langfuse
      AWS_S3_ENDPOINT: http://langfuse-minio:9000
      AWS_S3_FORCE_PATH_STYLE: "true"
      AWS_S3_UPLOAD_BUCKET_URL: http://langfuse-minio:9000/langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_ROOT_PASSWORD:-miniosecret}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://langfuse-minio:9000/langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_ROOT_PASSWORD:-miniosecret}
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      TELEMETRY_ENABLED: "false"
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-mysecret}
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:-}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME:-}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID:-}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME:-}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY:-}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-}

volumes:
  rag_postgres_data:
  ollama_data:
  langfuse_postgres_data:
  langfuse_clickhouse_data:
  langfuse_clickhouse_logs:
  langfuse_minio_data:
